name: PR Preview

# Deploys each pull request to a live preview at
#   https://cxs7700.github.io/gt7-tunes/pr-preview/pr-<N>/
# The preview is written into the `pr-preview/` folder of the Pages branch
# (main) and is removed automatically when the PR is closed or merged. The
# site at the repository root is left untouched.

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
    branches: [main]

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: .
          preview-branch: main
          umbrella-dir: pr-preview
