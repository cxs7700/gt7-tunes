name: PR Preview

# Builds the Next.js static export with a per-PR base path and deploys it to
#   https://cxs7700.github.io/gt7-tunes/pr-preview/pr-<N>/
# The preview is written into the pr-preview/ folder of the Pages branch (main)
# and removed automatically when the PR is closed. The root site is untouched.

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
    branches: [main]

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        if: github.event.action != 'closed'
        with:
          node-version: 20
          cache: npm

      - name: Install & build (preview base path)
        if: github.event.action != 'closed'
        env:
          BASE_PATH: /gt7-tunes/pr-preview/pr-${{ github.event.pull_request.number }}
        run: |
          npm ci
          npm run validate-data
          npm run build

      - name: Deploy / remove PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: out
          preview-branch: main
          umbrella-dir: pr-preview
