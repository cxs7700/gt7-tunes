<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 162 40" fill="none" role="img" aria-label="GT7 Tunes">
  <defs>
    <linearGradient id="gt7grad" x1="0" y1="4" x2="32" y2="36" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e94560"/>
      <stop offset="1" stop-color="#ff8a5b"/>
    </linearGradient>
  </defs>
  <!-- Mark: gauge/tachometer badge (original artwork) -->
  <rect x="0" y="4" width="32" height="32" rx="9" fill="url(#gt7grad)"/>
  <circle cx="16" cy="20" r="8.4" stroke="#fff" stroke-width="2.2"/>
  <!-- tick marks -->
  <line x1="16" y1="9.4" x2="16" y2="11.6" stroke="#fff" stroke-width="1.6" stroke-linecap="round" opacity="0.85"/>
  <line x1="6.8" y1="14.7" x2="8.7" y2="15.8" stroke="#fff" stroke-width="1.6" stroke-linecap="round" opacity="0.85"/>
  <line x1="25.2" y1="14.7" x2="23.3" y2="15.8" stroke="#fff" stroke-width="1.6" stroke-linecap="round" opacity="0.85"/>
  <!-- needle + hub -->
  <line x1="16" y1="20" x2="21.5" y2="14.5" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="16" cy="20" r="2.1" fill="#fff"/>
  <!-- Wordmark -->
  <text x="42" y="27.4" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="21" letter-spacing="0.2">
    <tspan font-weight="800" fill="#f2f3f9">GT7</tspan><tspan font-weight="600" fill="#9aa1bb"> Tunes</tspan>
  </text>
</svg>
