<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GT7 Tunes</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a2e;
  --bg-card: #16213e;
  --bg-input: #0f3460;
  --accent: #e94560;
  --accent-hover: #ff6b81;
  --text: #eee;
  --text-dim: #aaa;
  --border: #333;
  --tag-bg: #0f3460;
  --tag-active: #e94560;
  --shadow: rgba(0,0,0,0.4);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* Drop zone */
#drop-zone {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 80vh;
  border: 3px dashed var(--border);
  border-radius: 16px;
  margin: 40px;
  padding: 60px 20px;
  text-align: center;
  transition: border-color 0.2s, background 0.2s;
  cursor: pointer;
}
#drop-zone.drag-over {
  border-color: var(--accent);
  background: rgba(233, 69, 96, 0.05);
}
#drop-zone h1 { font-size: 2em; margin-bottom: 12px; }
#drop-zone p { color: var(--text-dim); font-size: 1.1em; margin-bottom: 20px; }
#drop-zone input[type="file"] { display: none; }
#drop-zone .btn {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 12px 32px;
  border-radius: 8px;
  font-size: 1em;
  cursor: pointer;
  transition: background 0.2s;
}
#drop-zone .btn:hover { background: var(--accent-hover); }

/* Main app */
#app { display: none; max-width: 1200px; margin: 0 auto; padding: 20px; }
#app.visible { display: block; }

/* Toolbar */
.toolbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  padding: 16px 0;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.toolbar input[type="text"] {
  flex: 1;
  min-width: 200px;
  padding: 10px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-input);
  color: var(--text);
  font-size: 1em;
  outline: none;
}
.toolbar input[type="text"]:focus { border-color: var(--accent); }
.toolbar .stats { color: var(--text-dim); font-size: 0.9em; white-space: nowrap; }
.toolbar .btn {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 8px 20px;
  border-radius: 8px;
  font-size: 0.9em;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.2s;
}
.toolbar .btn:hover { background: var(--accent-hover); }
.toolbar .btn.secondary {
  background: var(--bg-input);
  border: 1px solid var(--border);
}
.toolbar .btn.secondary:hover { border-color: var(--accent); }

/* Sort control */
.sort-control { display: flex; align-items: center; gap: 6px; }
.sort-control label { color: var(--text-dim); font-size: 0.9em; }
.sort-control select {
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-input);
  color: var(--text);
  font-size: 0.9em;
  outline: none;
  cursor: pointer;
}

/* Tags bar */
.tags-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.tag-btn {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--tag-bg);
  color: var(--text-dim);
  font-size: 0.85em;
  cursor: pointer;
  transition: all 0.2s;
}
.tag-btn:hover { border-color: var(--accent); color: var(--text); }
.tag-btn.active {
  background: var(--tag-active);
  border-color: var(--tag-active);
  color: #fff;
}

/* Post cards */
.posts-grid {
  display: grid;
  gap: 20px;
}
.post-card {
  background: var(--bg-card);
  border-radius: 12px;
  padding: 24px;
  border: 1px solid var(--border);
  transition: border-color 0.2s;
}
.post-card:hover { border-color: var(--accent); }
.post-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 12px;
}
.post-title {
  font-size: 1.2em;
  font-weight: 600;
  color: var(--text);
}
.post-title a {
  color: inherit;
  text-decoration: none;
}
.post-title a:hover { color: var(--accent); }
.post-date {
  color: var(--text-dim);
  font-size: 0.85em;
  white-space: nowrap;
}
.post-body {
  color: var(--text-dim);
  margin-bottom: 16px;
  white-space: pre-wrap;
  word-wrap: break-word;
  max-height: 300px;
  overflow: hidden;
  position: relative;
}
.post-body.expanded { max-height: none; }
.post-body.clamped::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: linear-gradient(transparent, var(--bg-card));
  pointer-events: none;
}
.expand-btn {
  background: none;
  border: none;
  color: var(--accent);
  cursor: pointer;
  font-size: 0.9em;
  padding: 4px 0;
  margin-bottom: 12px;
}
.expand-btn:hover { color: var(--accent-hover); }
.post-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 12px;
}
.post-tag {
  padding: 3px 10px;
  border-radius: 12px;
  background: var(--tag-bg);
  color: var(--text-dim);
  font-size: 0.8em;
}
.post-images {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}
.post-images img, .post-images .img-placeholder {
  width: 100%;
  border-radius: 8px;
  cursor: pointer;
  aspect-ratio: 16/10;
  object-fit: cover;
  transition: transform 0.2s;
}
.post-images img:hover { transform: scale(1.02); }
.img-placeholder {
  background: var(--bg-input);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  font-size: 0.8em;
}

/* Search highlight */
mark {
  background: var(--accent);
  color: #fff;
  border-radius: 2px;
  padding: 0 2px;
}

/* Lightbox */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: rgba(0,0,0,0.9);
  align-items: center;
  justify-content: center;
  cursor: zoom-out;
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 95vw;
  max-height: 95vh;
  object-fit: contain;
  border-radius: 8px;
}
.lightbox-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.1);
  border: none;
  color: #fff;
  font-size: 2em;
  padding: 20px 16px;
  cursor: pointer;
  border-radius: 8px;
  transition: background 0.2s;
}
.lightbox-nav:hover { background: rgba(255,255,255,0.2); }
.lightbox-nav.prev { left: 10px; }
.lightbox-nav.next { right: 10px; }
.lightbox-close {
  position: absolute;
  top: 16px;
  right: 20px;
  background: none;
  border: none;
  color: #fff;
  font-size: 2em;
  cursor: pointer;
}

/* Responsive */
@media (max-width: 600px) {
  #drop-zone { margin: 16px; padding: 40px 16px; }
  #app { padding: 12px; }
  .toolbar { gap: 8px; }
  .post-card { padding: 16px; }
  .post-images { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
}

/* --- Categorized filters --- */
.filters {
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.filter-group { margin-bottom: 14px; }
.filter-group:last-child { margin-bottom: 0; }
.filter-group-header {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
  font-size: 0.75em;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.filter-group-header:hover { color: var(--text); }
.filter-group-header .chevron { transition: transform 0.15s; font-size: 0.7em; }
.filter-group.collapsed .chevron { transform: rotate(-90deg); }
.filter-group.collapsed .filter-chips { display: none; }
.filter-group-header .sel-count {
  color: var(--accent);
  font-variant-numeric: tabular-nums;
}
.filter-chips { display: flex; flex-wrap: wrap; gap: 7px; }
.chip {
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--tag-bg);
  color: var(--text-dim);
  font-size: 0.84em;
  cursor: pointer;
  transition: all 0.15s;
}
.chip:hover { border-color: var(--accent); color: var(--text); }
.chip.active {
  background: var(--tag-active);
  border-color: var(--tag-active);
  color: #fff;
}
.chip .chip-count { opacity: 0.6; margin-left: 4px; font-size: 0.85em; }
.no-results {
  text-align: center;
  color: var(--text-dim);
  padding: 60px 20px;
  font-size: 1.1em;
}
</style>
</head>
<body>

<div id="drop-zone" style="display: none;">
  <h1>GT7 Tunes</h1>
  <p>Could not load <code>data/posts.json</code> automatically.<br>Drag &amp; drop it here, or click to browse.</p>
  <button class="btn" onclick="document.getElementById('file-input').click()">Choose File</button>
  <input type="file" id="file-input" accept=".json">
</div>

<div id="app" class="visible">
  <div class="toolbar">
    <input type="text" id="search" placeholder="Search tunes by car, track, setup…">
    <div class="sort-control">
      <label for="sort-select">Sort</label>
      <select id="sort-select">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
        <option value="title">Title A-Z</option>
      </select>
    </div>
    <button class="btn secondary" id="clear-filters" style="display: none;">Clear filters</button>
    <span class="stats" id="stats">Loading…</span>
  </div>
  <div class="filters" id="filters"></div>
  <div class="posts-grid" id="posts-grid"></div>
</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lb-close">×</button>
  <button class="lightbox-nav prev" id="lb-prev">‹</button>
  <button class="lightbox-nav next" id="lb-next">›</button>
  <img id="lb-img" src="" alt="">
</div>

<script>
(function() {
  'use strict';

  // ---------------------------------------------------------------------------
  // State
  // ---------------------------------------------------------------------------
  let posts = [];
  let categorized = {};          // category -> [{tag, count}]
  let tagCategoryOf = {};        // tag -> category
  let activeFilters = new Set(); // selected tag strings (across categories)
  let collapsedCats = new Set(); // categories collapsed in the UI
  let searchQuery = '';
  let sortMode = 'newest';
  let embeddedImages = {};       // url -> data URI (unused unless data is re-baked)
  let allImageUrls = [];         // flat list for lightbox nav

  // ---------------------------------------------------------------------------
  // Tag categorization
  //
  // Tags are grouped into the categories below for the filter UI. "Make / Brand"
  // is an explicit allow-list of real GT7 manufacturers/brands (including tuners
  // and hot-rod shops that GT7 lists as brands). Anything that isn't a make and
  // doesn't match another rule (e.g. model/generation tags like "C2") falls into
  // "Other", so the make list stays accurate. To tweak categorization, edit the
  // sets below -- the data itself is never modified. Add new GT7 brands to MAKES.
  // ---------------------------------------------------------------------------
  const CATEGORY_ORDER = ['PP', 'Class', 'Drivetrain', 'Track', 'Make / Brand', 'Rating', 'Setup', 'Other'];
  const COLLAPSED_BY_DEFAULT = new Set();

  const DRIVETRAINS = new Set(['FF', 'FR', 'MR', 'RR', '4WD']);
  const CLASSES = new Set([
    'Gr1', 'Gr2', 'Gr3', 'Gr4', 'GrB', 'VGT', 'F1', 'Super Formula', 'Nascar',
    'WTC800', 'Porsche Cup', 'historic cup', 'Historic', 'daily race', 'WEC specs',
    'Driving lesson'
  ]);
  const TRACKS = new Set([
    'Alsace', 'Bathurst', 'Brands Hatch', 'Daytona', 'Deep Forest', 'Fuji',
    'Goodwood', 'High speed ring', 'Interlagos', 'Laguna Seca', 'Le Mans',
    'Nordschleife', 'Nordschleiffe', 'nordschleife', 'Road Atlanta', 'Route X',
    'SPA', 'Sardegna', 'Suzuka', 'suzuka', 'Tokyo', 'Tsukuba', 'watkins Glen',
    'eiger', 'all track'
  ]);
  const SETUP = new Set(['SWAP', 'swap', 'fast', 'BOP']);
  // Real GT7 manufacturers/brands (Brand Central, Legend & tuner brands).
  const MAKES = new Set([
    'Abarth', 'Alfa Romeo', 'Alpine', 'AMG', 'Amuse', 'Aston Martin', 'AUDI',
    'Autobianchi', 'BAC', 'BMW', 'Bugatti', 'Chaparral', 'CHC', 'Chevrolet',
    'Citroen', 'Daihatsu', 'De Tomaso', 'DMC', 'Dodge', 'DS Automobiles',
    "Exkert's Rod", 'Ferrari', 'Fiat', 'Ford', 'Garage RCR', 'Genesis',
    'Gran Turismo', 'Greddy', 'Greening Auto Company', 'Honda', 'Hyundai',
    'Jaguar', 'jeep', 'KTM', 'Lamborghini', 'Lancia', 'Lexus', 'Maserati',
    'Mazda', 'McLaren', 'Mercedes', "Mine's", 'Mini', 'Mitsubishi', 'Nismo',
    'Nissan', 'Pagani', 'Peugeot', 'Plymouth', 'Polestar', 'Pontiac', 'Porsche',
    'Radical', 'Re Amemiya', 'Renault', 'Roadster Shop', 'RUF', 'Shelby',
    'Subaru', 'Suzuki', 'Tesla', 'Toyota', 'TVR', 'Volkswagen', 'Volvo',
    'Wicked Fabrication', 'Xiaomi', 'Yangwang'
  ]);

  function categorize(tag) {
    if (/pp$/i.test(tag) || /^\d{3,4}$/.test(tag)) return 'PP';
    if (/^\d+\s*stars?$/i.test(tag)) return 'Rating';  // "4 stars" / "5 STARS" (not "Polestar")
    if (DRIVETRAINS.has(tag)) return 'Drivetrain';
    if (CLASSES.has(tag)) return 'Class';
    if (TRACKS.has(tag)) return 'Track';
    if (SETUP.has(tag)) return 'Setup';
    if (MAKES.has(tag)) return 'Make / Brand';
    return 'Other';
  }

  // Sort PP tags numerically, everything else case-insensitively.
  function ppValue(tag) {
    const m = tag.match(/\d+/);
    return m ? parseInt(m[0], 10) : 0;
  }
  function tagComparator(category) {
    if (category === 'PP' || category === 'Rating') {
      return (a, b) => ppValue(a.tag) - ppValue(b.tag) || a.tag.localeCompare(b.tag);
    }
    return (a, b) => a.tag.toLowerCase().localeCompare(b.tag.toLowerCase());
  }

  // ---------------------------------------------------------------------------
  // DOM refs
  // ---------------------------------------------------------------------------
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const app = document.getElementById('app');
  const searchInput = document.getElementById('search');
  const sortSelect = document.getElementById('sort-select');
  const statsEl = document.getElementById('stats');
  const filtersEl = document.getElementById('filters');
  const postsGrid = document.getElementById('posts-grid');
  const clearBtn = document.getElementById('clear-filters');
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');
  const lbClose = document.getElementById('lb-close');
  const lbPrev = document.getElementById('lb-prev');
  const lbNext = document.getElementById('lb-next');

  let lbIndex = 0;

  // ---------------------------------------------------------------------------
  // Data loading
  // ---------------------------------------------------------------------------
  async function init() {
    try {
      const res = await fetch('data/posts.json', { cache: 'no-cache' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      ingestPosts(await res.json());
    } catch (err) {
      // Fallback: baked data if present (re-baked builds), else the drop zone.
      if (typeof __BAKED_DATA__ !== 'undefined') {
        ingestPosts(__BAKED_DATA__);
      } else {
        console.warn('Could not load data/posts.json (' + err.message +
          '). Serve over HTTP, or drag & drop the file.');
        app.classList.remove('visible');
        dropZone.style.display = 'flex';
      }
    }
  }

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) loadFile(file);
  });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

  function loadFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        ingestPosts(Array.isArray(data) ? data : [data]);
      } catch (err) {
        alert('Failed to parse JSON: ' + err.message);
      }
    };
    reader.readAsText(file);
  }

  function ingestPosts(raw) {
    // Dedup by id
    const seen = new Map();
    for (const p of raw) {
      const id = p.id || p.url || JSON.stringify(p);
      if (!seen.has(id)) seen.set(id, p);
    }
    posts = Array.from(seen.values());

    // Tally tags and assign categories
    const counts = new Map();
    for (const p of posts) {
      if (Array.isArray(p.tags)) {
        for (const t of p.tags) counts.set(t, (counts.get(t) || 0) + 1);
      }
    }
    categorized = {};
    tagCategoryOf = {};
    for (const [tag, count] of counts) {
      const cat = categorize(tag);
      tagCategoryOf[tag] = cat;
      (categorized[cat] || (categorized[cat] = [])).push({ tag, count });
    }
    for (const cat of Object.keys(categorized)) {
      categorized[cat].sort(tagComparator(cat));
    }
    collapsedCats = new Set(COLLAPSED_BY_DEFAULT);

    // Flat image list for lightbox navigation
    allImageUrls = [];
    for (const p of posts) {
      if (Array.isArray(p.imageUrls)) allImageUrls.push(...p.imageUrls);
    }

    dropZone.style.display = 'none';
    app.classList.add('visible');
    renderFilters();
    renderPosts();
  }

  // ---------------------------------------------------------------------------
  // Search, sort & filter
  // ---------------------------------------------------------------------------
  let searchTimeout;
  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      searchQuery = searchInput.value.trim().toLowerCase();
      renderPosts();
      updateClearBtn();
    }, 200);
  });

  sortSelect.addEventListener('change', () => {
    sortMode = sortSelect.value;
    renderPosts();
  });

  clearBtn.addEventListener('click', () => {
    activeFilters.clear();
    searchQuery = '';
    searchInput.value = '';
    renderFilters();
    renderPosts();
    updateClearBtn();
  });

  function updateClearBtn() {
    clearBtn.style.display = (activeFilters.size || searchQuery) ? '' : 'none';
  }

  function renderFilters() {
    filtersEl.innerHTML = '';
    const cats = CATEGORY_ORDER.filter(c => categorized[c] && categorized[c].length);
    // Append any categories not in the explicit order (future-proofing)
    for (const c of Object.keys(categorized)) {
      if (!cats.includes(c)) cats.push(c);
    }

    for (const cat of cats) {
      const group = document.createElement('div');
      group.className = 'filter-group' + (collapsedCats.has(cat) ? ' collapsed' : '');

      const selInCat = categorized[cat].filter(t => activeFilters.has(t.tag)).length;
      const header = document.createElement('div');
      header.className = 'filter-group-header';
      header.innerHTML = '<span class="chevron">▾</span>' +
        '<span>' + escapeHtml(cat) + '</span>' +
        (selInCat ? '<span class="sel-count">(' + selInCat + ')</span>' : '');
      header.onclick = () => {
        if (collapsedCats.has(cat)) collapsedCats.delete(cat); else collapsedCats.add(cat);
        group.classList.toggle('collapsed');
      };
      group.appendChild(header);

      const chips = document.createElement('div');
      chips.className = 'filter-chips';
      for (const { tag, count } of categorized[cat]) {
        const chip = document.createElement('button');
        chip.className = 'chip' + (activeFilters.has(tag) ? ' active' : '');
        chip.innerHTML = escapeHtml(tag) + '<span class="chip-count">' + count + '</span>';
        chip.onclick = () => {
          if (activeFilters.has(tag)) activeFilters.delete(tag); else activeFilters.add(tag);
          renderFilters();
          renderPosts();
          updateClearBtn();
        };
        chips.appendChild(chip);
      }
      group.appendChild(chips);
      filtersEl.appendChild(group);
    }
  }

  function getFiltered() {
    let filtered = posts;

    if (activeFilters.size) {
      // Group selected tags by category: OR within a category, AND across them.
      const byCat = {};
      for (const t of activeFilters) {
        const c = tagCategoryOf[t] || 'Make / Brand';
        (byCat[c] || (byCat[c] = [])).push(t);
      }
      const groups = Object.values(byCat);
      filtered = filtered.filter(p => {
        const tags = Array.isArray(p.tags) ? p.tags : [];
        return groups.every(g => g.some(t => tags.includes(t)));
      });
    }

    if (searchQuery) {
      filtered = filtered.filter(p => {
        const text = ((p.title || '') + ' ' + (p.body || '') + ' ' +
          (p.tags || []).join(' ')).toLowerCase();
        return text.includes(searchQuery);
      });
    }

    filtered = [...filtered];
    if (sortMode === 'oldest') {
      filtered.reverse();
    } else if (sortMode === 'title') {
      filtered.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
    } // 'newest' keeps source order (scraper returns newest first)
    return filtered;
  }

  // ---------------------------------------------------------------------------
  // Rendering
  // ---------------------------------------------------------------------------
  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function highlightText(text) {
    if (!searchQuery || !text) return escapeHtml(text || '');
    const escaped = escapeHtml(text);
    const re = new RegExp('(' + escapeHtml(searchQuery).replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    return escaped.replace(re, '<mark>$1</mark>');
  }

  function renderPosts() {
    const filtered = getFiltered();
    statsEl.textContent = filtered.length + ' of ' + posts.length + ' tunes';
    postsGrid.innerHTML = '';

    if (!filtered.length) {
      postsGrid.innerHTML = '<div class="no-results">No tunes match your filters.</div>';
      return;
    }

    for (const post of filtered) {
      const card = document.createElement('div');
      card.className = 'post-card';

      const titleHtml = post.url
        ? '<a href="' + escapeHtml(post.url) + '" target="_blank" rel="noopener">' + highlightText(post.title || 'Untitled') + '</a>'
        : highlightText(post.title || 'Untitled');

      let imagesHtml = '';
      if (Array.isArray(post.imageUrls) && post.imageUrls.length > 0) {
        const imgs = post.imageUrls.map(url => {
          const src = embeddedImages[url] || url;
          const globalIdx = allImageUrls.indexOf(url);
          return '<img src="' + escapeHtml(src) + '" loading="lazy" data-lb-index="' + globalIdx + '" alt="" onerror="this.style.display=\'none\'">';
        }).join('');
        imagesHtml = '<div class="post-images">' + imgs + '</div>';
      }

      const tagsHtml = Array.isArray(post.tags) && post.tags.length > 0
        ? '<div class="post-tags">' + post.tags.map(t => '<span class="post-tag">' + escapeHtml(t) + '</span>').join('') + '</div>'
        : '';

      const bodyId = 'body-' + (post.id || Math.random().toString(36).slice(2));

      card.innerHTML =
        '<div class="post-header">' +
          '<div class="post-title">' + titleHtml + '</div>' +
          '<div class="post-date">' + escapeHtml(post.date || '') + '</div>' +
        '</div>' +
        '<div class="post-body" id="' + bodyId + '">' + highlightText(post.body || '') + '</div>' +
        tagsHtml +
        imagesHtml;
      postsGrid.appendChild(card);

      // Clamp long bodies with a "Show more" toggle
      requestAnimationFrame(() => {
        const bodyEl = document.getElementById(bodyId);
        if (bodyEl && bodyEl.scrollHeight > 300) {
          bodyEl.classList.add('clamped');
          const btn = document.createElement('button');
          btn.className = 'expand-btn';
          btn.textContent = 'Show more';
          btn.onclick = () => {
            const expanded = bodyEl.classList.toggle('expanded');
            bodyEl.classList.toggle('clamped', !expanded);
            btn.textContent = expanded ? 'Show less' : 'Show more';
          };
          bodyEl.after(btn);
        }
      });
    }
  }

  // ---------------------------------------------------------------------------
  // Lightbox
  // ---------------------------------------------------------------------------
  function showLbImage() {
    const url = allImageUrls[lbIndex];
    lbImg.src = embeddedImages[url] || url;
  }
  function openLightbox(index) {
    lbIndex = index;
    showLbImage();
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
    lbImg.src = '';
  }

  lbClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
  lbPrev.addEventListener('click', e => {
    e.stopPropagation();
    lbIndex = (lbIndex - 1 + allImageUrls.length) % allImageUrls.length;
    showLbImage();
  });
  lbNext.addEventListener('click', e => {
    e.stopPropagation();
    lbIndex = (lbIndex + 1) % allImageUrls.length;
    showLbImage();
  });
  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    else if (e.key === 'ArrowLeft') lbPrev.click();
    else if (e.key === 'ArrowRight') lbNext.click();
  });

  postsGrid.addEventListener('click', e => {
    const img = e.target.closest('img[data-lb-index]');
    if (img) {
      const idx = parseInt(img.dataset.lbIndex, 10);
      if (idx >= 0) openLightbox(idx);
    }
  });

  // ---------------------------------------------------------------------------
  init();

})();
</script>


</body></html>
